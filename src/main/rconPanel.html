<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SCUM RCON Manager</title>
<link rel="icon" href="/favicon.ico">
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:auto;height:100vh;font-size:14px}
.login-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1000;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:32px;width:360px;text-align:center}
.login-box h1{font-size:20px;font-weight:700;margin-bottom:24px}
.login-box input{width:100%;padding:10px 12px;margin-bottom:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:10px;background:#238636;border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:500;cursor:pointer}
.login-box button:hover{background:#2ea043}
.login-box .error{color:var(--red);font-size:13px;margin-top:10px;display:none}
#dashboard{display:none;padding:24px}
.page-title{font-size:24px;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.badge{font-size:12px;padding:2px 10px;border-radius:12px;font-weight:600}
.badge.online{background:rgba(63,185,80,.15);color:var(--green);border:1px solid var(--green)}
.badge.offline{background:rgba(248,81,73,.15);color:var(--red);border:1px solid var(--red)}
.tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab{padding:8px 16px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500}
.tab:hover{background:rgba(255,255,255,.04);color:var(--text)}
.tab.active{background:rgba(88,166,255,.1);color:var(--accent);border-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
.btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn:hover{background:rgba(255,255,255,.04)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-success{background:#238636;border-color:#238636;color:#fff}
.btn-success:hover{background:#2ea043}
.btn-danger{background:#da3633;border-color:#da3633;color:#fff}
.btn-danger:hover{background:#f85149}
.btn-warning{background:#9e6a03;border-color:#9e6a03;color:#fff}
.btn-primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
.btn-primary:hover{background:#388bfd}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase}
tr:hover{background:rgba(255,255,255,.02)}
.console-box{height:400px;overflow:auto;padding:12px;font-family:Consolas,monospace;font-size:12px;line-height:1.5;background:var(--bg);border:1px solid var(--border);border-radius:6px}
.console-box .line{color:#c9d1d9;white-space:pre-wrap;word-break:break-all;padding:1px 0}
.input-group{display:flex;gap:8px;margin-bottom:12px}
.input-group input,.input-group select{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.input-group input:focus,.input-group select:focus{border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;width:500px;max-width:90vw}
.modal h3{margin-bottom:16px;font-size:18px}
.modal .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.modal input,.modal select{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.snack{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;display:none;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.snack.error{background:#da3633}
.player-actions{display:flex;gap:4px;flex-wrap:wrap}
.player-actions .btn{padding:4px 8px;font-size:11px}
</style>
</head>
<body>
<div id="loginPage" class="login-overlay">
  <div class="login-box">
    <h1>SCUM RCON Manager</h1>
    <input type="text" id="loginUser" placeholder="Логин" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Пароль" autocomplete="current-password">
    <button id="loginBtn" onclick="login()">Войти</button>
    <div class="error" id="loginError">Неверный логин или пароль</div>
  </div>
</div>
<div id="dashboard">
  <div class="page-title">
    <span>SCUM RCON Manager</span>
    <span id="rconStatus" class="badge offline">RCON OFFLINE</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('console')">RCON Консоль</button>
    <button class="tab" onclick="switchTab('players')">Онлайн Игроки</button>
  </div>
  <div id="consoleTab" class="tab-content active">
    <div class="card">
      <h3 style="margin-bottom:12px">Подключение к RCON</h3>
      <div class="input-group">
        <input type="text" id="rconHost" placeholder="Host" value="127.0.0.1">
        <input type="number" id="rconPort" placeholder="Port" value="28015">
        <input type="password" id="rconPassword" placeholder="Password">
        <button class="btn btn-success" id="btnConnect" onclick="rconConnect()">Подключиться</button>
      </div>
    </div>
    <div class="card">
      <div class="input-group">
        <input type="text" id="commandInput" placeholder="Введите команду..." onkeydown="if(event.key==='Enter')sendCommand()">
        <button class="btn btn-primary" onclick="sendCommand()">Отправить</button>
      </div>
      <div class="console-box" id="console"></div>
    </div>
  </div>
  <div id="playersTab" class="tab-content">
    <div class="card">
      <table>
        <thead>
          <tr><th>Имя</th><th>SteamID</th><th>Время онлайн</th><th>Действия</th></tr>
        </thead>
        <tbody id="playersTable"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="modal-overlay" id="attrModal">
  <div class="modal">
    <h3>Выдать атрибуты</h3>
    <div class="form-row">
      <div><label>Strength</label><input type="number" id="attrStr" value="8"></div>
      <div><label>Dexterity</label><input type="number" id="attrDex" value="5"></div>
      <div><label>Stamina</label><input type="number" id="attrSta" value="5"></div>
      <div><label>Intellect</label><input type="number" id="attrInt" value="5"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('attrModal')">Отмена</button>
      <button class="btn btn-primary" onclick="submitAttributes()">Отправить</button>
    </div>
  </div>
</div>
<div class="snack" id="snack"></div>
<script>
let token=localStorage.getItem('wp_token');
let currentSteamId='';
let players=[];

function gid(id){return document.getElementById(id)}

function showLogin(){gid('loginPage').style.display='flex';gid('dashboard').style.display='none'}
function showDash(){gid('loginPage').style.display='none';gid('dashboard').style.display='block'}

async function login(){
  const user=gid('loginUser').value;
  const pass=gid('loginPass').value;
  const btn=gid('loginBtn');
  const err=gid('loginError');
  btn.disabled=true;btn.textContent='Вход...';err.style.display='none';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    const d=await r.json();
    if(d.token){token=d.token;localStorage.setItem('wp_token',token);showDash();initDashboard()}
    else{err.style.display='block';btn.disabled=false;btn.textContent='Войти'}
  }catch(e){err.textContent=e.message;err.style.display='block';btn.disabled=false;btn.textContent='Войти'}
}

function authHeaders(){return token?{Authorization:'Bearer '+token}:{}}

async function fetchWithAuth(url,opts){
  opts=opts||{};opts.headers={...opts.headers,...authHeaders()};
  const r=await fetch(url,opts);if(r.status===401){logout();throw new Error('Сессия истекла')}
  return r;
}

function logout(){localStorage.removeItem('wp_token');token=null;showLogin()}

function snack(msg,err){
  const el=gid('snack');
  el.textContent=msg;el.className='snack'+(err?' error':'');el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  gid(tab+'Tab').classList.add('active');
  if(tab==='players')loadPlayers();
}

function appendConsole(text,cls){
  const box=gid('console');
  const line=document.createElement('div');
  line.className='line'+(cls?' '+cls:'');
  line.textContent=text;
  box.appendChild(line);
  box.scrollTop=box.scrollHeight;
  if(box.children.length>500)box.removeChild(box.firstChild);
}

async function rconConnect(){
  const host=gid('rconHost').value;
  const port=parseInt(gid('rconPort').value);
  const password=gid('rconPassword').value;
  const btn=gid('btnConnect');
  btn.disabled=true;btn.textContent='Подключение...';
  try{
    const r=await fetchWithAuth('/api/rcon/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({host,port,password})});
    const d=await r.json();
    if(d.success){
      appendConsole('[SYSTEM] '+d.response,'connect');
      updateRconStatus(true);
      snack('Подключено к RCON');
    }else{
      appendConsole('[ERROR] '+d.error,'error');
      snack(d.error,true);
    }
  }catch(e){appendConsole('[ERROR] '+e.message,'error');snack(e.message,true)}
  btn.disabled=false;btn.textContent='Подключиться';
}

async function sendCommand(){
  const cmd=gid('commandInput').value.trim();
  if(!cmd)return;
  appendConsole('$ '+cmd);
  try{
    const r=await fetchWithAuth('/api/rcon/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})});
    const d=await r.json();
    if(d.success){appendConsole(d.response)}else{appendConsole('[ERROR] '+d.error,'error')}
    gid('commandInput').value='';
  }catch(e){appendConsole('[ERROR] '+e.message,'error')}
}

function updateRconStatus(connected){
  const badge=gid('rconStatus');
  badge.textContent=connected?'RCON ONLINE':'RCON OFFLINE';
  badge.className='badge '+(connected?'online':'offline');
}

async function loadPlayers(){
  try{
    const r=await fetchWithAuth('/api/players/online');
    const d=await r.json();
    players=d.players||[];
    renderPlayers();
  }catch(e){console.error('Failed to load players:',e)}
}

function formatDuration(seconds){
  const h=Math.floor(seconds/3600);
  const m=Math.floor((seconds%3600)/60);
  const s=seconds%60;
  if(h>0)return h+'ч '+m+'м';
  if(m>0)return m+'м '+s+'с';
  return s+'с';
}

function renderPlayers(){
  const tbody=gid('playersTable');
  if(players.length===0){
    tbody.innerHTML='<tr><td colspan="4" align="center">Нет игроков онлайн</td></tr>';
    return;
  }
  tbody.innerHTML=players.map(p=>`
    <tr>
      <td>${p.name}</td>
      <td style="font-family:monospace;font-size:12px">${p.steamId}</td>
      <td>${formatDuration(p.duration)}</td>
      <td class="player-actions">
        <button class="btn btn-warning" onclick="openAttrModal('${p.steamId}')">⚡ Атрибуты</button>
        <button class="btn btn-primary" onclick="playerAction('${p.steamId}','godMode',{enabled:true})">🛡 God</button>
        <button class="btn btn-danger" onclick="playerAction('${p.steamId}','suicide',{})">💀 Kill</button>
        <button class="btn" onclick="playerAction('${p.steamId}','unstuck',{})">🆘 Unstuck</button>
        <button class="btn" onclick="playerAction('${p.steamId}','silence',{})">🔇 Silence</button>
      </td>
    </tr>
  `).join('');
}

function openModal(id){gid(id).classList.add('active')}
function closeModal(id){gid(id).classList.remove('active')}

function openAttrModal(steamId){
  currentSteamId=steamId;
  openModal('attrModal');
}

async function submitAttributes(){
  const str=parseInt(gid('attrStr').value);
  const dex=parseInt(gid('attrDex').value);
  const sta=parseInt(gid('attrSta').value);
  const int_=parseInt(gid('attrInt').value);
  await playerAction(currentSteamId,'setAttributes',{strength:str,dexterity:dex,stamina:sta,intellect:int_});
  closeModal('attrModal');
}

async function playerAction(steamId,action,params){
  try{
    const r=await fetchWithAuth('/api/players/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({steamId,action,params})});
    const d=await r.json();
    if(d.success){snack('Команда отправлена')}else{snack(d.error,true)}
  }catch(e){snack(e.message,true)}
}

function initDashboard(){
  checkRconStatus();
  setInterval(()=>{
    if(gid('playersTab').classList.contains('active'))loadPlayers();
  },5000);
}

async function checkRconStatus(){
  try{
    const r=await fetchWithAuth('/api/rcon/status');
    const d=await r.json();
    updateRconStatus(d.connected);
  }catch(e){}
}

(function(){
  if(!token||token.length<10){showLogin();return}
  fetchWithAuth('/api/status').then(r=>{showDash();initDashboard()}).catch(()=>showLogin());
})();
</script>
</body>
</html>
